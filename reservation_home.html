<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองโต๊ะ - Champuchino</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Prompt สำหรับภาษาไทย -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                    },
                    colors: {
                        cream: '#FAF8F5',
                        brown: {
                            light: '#C08A56',
                            DEFAULT: '#8B5A2B',
                            dark: '#3E2716',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            background-color: #EFEBE4; /* สีพื้นหลังหน้าจอนอกกรอบมือถือ */
        }
    </style>
</head>
<body class="antialiased min-h-screen pb-10 flex justify-center">

    <!-- Mobile Container (จำกัดความกว้างให้ดูเหมือนแอปบนมือถือ) -->
    <div class="w-full max-w-md bg-white min-h-screen shadow-2xl relative overflow-x-hidden">

        <!-- 1. Header: โลโก้ และ โปรไฟล์ LINE -->
        <header class="flex justify-between items-center p-5 bg-white/90 backdrop-blur-md sticky top-0 z-10 shadow-sm">
            <div class="font-bold text-xl text-brown-dark flex items-center">
                <div class="w-8 h-8 rounded-full bg-brown text-white flex items-center justify-center mr-2 text-sm">
                    <i class="fa-solid fa-mug-hot"></i>
                </div>
                Champuchino
            </div>
            <!-- LINE Profile Simulation -->
            <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden border-2 border-[#00B900] p-[2px]">
                <img src="https://i.pravatar.cc/100?img=33" alt="LINE Profile" class="w-full h-full rounded-full object-cover">
            </div>
        </header>

        <!-- Main Content -->
        <main class="p-5">
            
            <!-- ข้อความทักทาย -->
            <div class="mb-6">
                <h1 class="text-2xl font-semibold mb-1 text-brown-dark">สวัสดี, คุณสมชาย</h1>
                <p class="text-sm text-gray-500">มหาวิทยาลัยนครพนม</p>
            </div>

            <!-- 2. Card 'การจองของฉัน' -->
            <section class="mb-8">
                <div class="flex justify-between items-end mb-3">
                    <h2 class="font-medium text-lg text-brown-dark"><i class="fa-regular fa-calendar-check mr-2 text-brown"></i>การจองของฉัน</h2>
                </div>
                
                <div id="my-booking-container">
                    <!-- จะถูกแทนที่ด้วย Javascript -->
                    <div class="text-center p-5 text-gray-500 bg-white rounded-2xl border border-dashed border-gray-300">กำลังโหลดข้อมูลการจอง...</div>
                </div>
            </section>

            <!-- 3. Section 'โต๊ะว่างวันนี้' -->
            <section class="mb-20">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-medium text-lg text-brown-dark"><i class="fa-solid fa-chair mr-2 text-brown"></i>สถานะโต๊ะวันนี้</h2>
                    <span id="update-time" class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded-full">กำลังโหลด...</span>
                </div>

                <div id="tables-container" class="grid grid-cols-2 gap-3.5">
                    <!-- จะถูกแทนที่ด้วย Javascript -->
                    <div class="col-span-2 text-center p-5 text-gray-500">กำลังดึงข้อมูลโต๊ะจากฐานข้อมูล...</div>
                </div>
            </section>

        </main>

        <!-- 4. Action Button: Floating Action Button (FAB) -->
        <button onclick="window.location.href='booking_form.html'" class="absolute bottom-6 right-6 bg-brown text-white w-16 h-16 rounded-full shadow-lg shadow-brown/40 flex items-center justify-center text-2xl transition-all hover:bg-brown-dark hover:scale-105 active:scale-95">
            <i class="fa-solid fa-plus"></i>
        </button>

    </div>

    <!-- Script สำหรับเชื่อมต่อ Supabase และอัปเดต UI -->
    <script>
        // 1. การตั้งค่า Supabase
        const SUPABASE_URL = 'https://ocxthtgfsgzjnrxuyrqo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jeHRodGdmc2d6am5yeHV5cnFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODc0ODIsImV4cCI6MjA5NzU2MzQ4Mn0.txzsCMCnXvUrhuCWiJ43ji8CBY4ImuzPyaCtlWAdCJw';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let tables = [];
        let todayBookings = [];
        let myLatestBooking = null;

        async function initData() {
            await fetchTables();
            await fetchTodayBookings();
            await fetchMyBooking();
            renderTables();
            renderMyBooking();
            
            // อัปเดตเวลาล่าสุดบนหน้าจอ
            const now = new Date();
            const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('update-time').innerText = `อัปเดตล่าสุด: ${timeStr} น.`;
        }

        // 2. ดึงข้อมูลโต๊ะ
        async function fetchTables() {
            const { data, error } = await supabase.from('cafe_tables').select('*').order('table_number');
            if (data) tables = data;
        }

        // 3. ตรวจสอบคิวว่าง
        async function fetchTodayBookings() {
            const today = new Date().toISOString().split('T')[0];
            const { data, error } = await supabase
                .from('bookings')
                .select('table_id, status')
                .eq('booking_date', today)
                .neq('status', 'cancelled');
            if (data) todayBookings = data;
        }

        // 5. จำลองการจอง (My Booking)
        async function fetchMyBooking() {
            // ดึงการจองล่าสุด 1 รายการเพื่อมาแสดงผล
            const { data, error } = await supabase
                .from('bookings')
                .select('*, cafe_tables(table_number)')
                .order('created_at', { ascending: false })
                .limit(1);
            if (data && data.length > 0) myLatestBooking = data[0];
        }

        // 4. อัปเดต UI หน้าจอ: โต๊ะว่างวันนี้
        function renderTables() {
            const container = document.getElementById('tables-container');
            container.innerHTML = '';
            
            // Mock Fallback หากดึงข้อมูลไม่ได้ (มีประโยชน์ตอนยังไม่มีข้อมูลจริงๆ)
            if (tables.length === 0) {
                tables = [
                    { id: 1, table_number: 1, capacity: 8, status: 'available' },
                    { id: 2, table_number: 2, capacity: 8, status: 'available' },
                    { id: 3, table_number: 3, capacity: 8, status: 'available' },
                    { id: 4, table_number: 4, capacity: 8, status: 'available' }
                ];
            }

            tables.forEach(table => {
                const isBooked = todayBookings.some(b => b.table_id === table.id);
                const isAvailable = table.status === 'available' && !isBooked;

                const bgColor = isAvailable ? 'bg-green-50' : 'bg-gray-50';
                const borderColor = isAvailable ? 'border-green-200' : 'border-gray-200';
                const iconBgColor = isAvailable ? 'bg-green-100' : 'bg-gray-200';
                const iconColor = isAvailable ? 'text-green-600' : 'text-gray-400';
                const titleColor = isAvailable ? 'text-brown-dark' : 'text-gray-500';
                const badgeBg = isAvailable ? 'bg-green-200/60' : 'bg-gray-200';
                const badgeText = isAvailable ? 'text-green-700' : 'text-gray-600';
                const statusText = isAvailable ? 'ว่าง' : 'มีคิวจอง';
                const opacity = isAvailable ? '' : 'opacity-80';

                container.innerHTML += `
                    <div class="${bgColor} border ${borderColor} rounded-2xl p-4 flex flex-col items-center justify-center text-center shadow-sm transition-transform active:scale-95 ${opacity}">
                        <div class="w-12 h-12 rounded-full ${iconBgColor} ${iconColor} flex items-center justify-center text-xl mb-2">
                            <i class="fa-solid fa-chair"></i>
                        </div>
                        <h4 class="font-semibold ${titleColor}">โต๊ะ ${table.table_number}</h4>
                        <p class="text-[10px] text-gray-500 mb-2">รองรับสูงสุด ${table.capacity} ท่าน</p>
                        <span class="text-[11px] font-bold ${badgeText} ${badgeBg} px-3 py-1 rounded-full">${statusText}</span>
                    </div>
                `;
            });
        }

        // อัปเดต UI หน้าจอ: การจองของฉัน
        function renderMyBooking() {
            const container = document.getElementById('my-booking-container');
            if (!myLatestBooking) {
                container.innerHTML = `<div class="text-center p-5 text-gray-500 bg-white rounded-2xl border border-dashed border-gray-300">คุณยังไม่มีคิวจองในระบบ</div>`;
                return;
            }

            const dateStr = new Date(myLatestBooking.booking_date).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
            let statusBadge = '';
            if (myLatestBooking.status === 'pending') {
                statusBadge = `<span class="bg-yellow-500 text-yellow-900 text-xs font-bold px-3 py-1 rounded-full flex items-center shadow-sm"><i class="fa-solid fa-hourglass-half mr-1.5"></i> รออนุมัติ</span>`;
            } else if (myLatestBooking.status === 'approved') {
                statusBadge = `<span class="bg-green-500 text-white text-xs font-bold px-3 py-1 rounded-full flex items-center shadow-sm"><i class="fa-solid fa-check mr-1.5"></i> อนุมัติแล้ว</span>`;
            } else {
                statusBadge = `<span class="bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full flex items-center shadow-sm"><i class="fa-solid fa-xmark mr-1.5"></i> ยกเลิก</span>`;
            }

            // ถ้าไม่มี relation (เช่น join ไม่ติด) ให้แสดง table_id แทน
            const tableNum = myLatestBooking.cafe_tables?.table_number || myLatestBooking.table_id;
            
            // ป้องกัน undefined ของเวลา
            const startTime = myLatestBooking.start_time ? myLatestBooking.start_time.substring(0,5) : '';
            const endTime = myLatestBooking.end_time ? myLatestBooking.end_time.substring(0,5) : '';

            container.innerHTML = `
                <div class="bg-brown-dark text-white rounded-2xl p-5 shadow-lg relative overflow-hidden">
                    <i class="fa-solid fa-mug-saucer absolute -right-2 -bottom-4 text-7xl opacity-10 transform -rotate-12"></i>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-brown-light text-xs font-semibold uppercase tracking-wider mb-1">โต๊ะที่คุณจอง</p>
                            <h3 class="text-3xl font-bold">โต๊ะ ${tableNum}</h3>
                        </div>
                        ${statusBadge}
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-5 pt-4 border-t border-white/20">
                        <div>
                            <p class="text-xs text-gray-300 mb-1"><i class="fa-regular fa-calendar mr-1"></i> วันที่จอง</p>
                            <p class="text-sm font-medium">${dateStr}</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-300 mb-1"><i class="fa-regular fa-clock mr-1"></i> เวลา</p>
                            <p class="text-sm font-medium">${startTime} - ${endTime} น.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        initData();
    </script>
</body>
</html>
